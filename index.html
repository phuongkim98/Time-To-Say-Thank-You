<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lời Chào Từ Bà T 🌸</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>
:root{
    --pink:#ffafcc;
    --deep:#fb6f92;
}

body{
    font-family:'Segoe UI';
    background: radial-gradient(circle,#1a1a2e,#0f0f1a);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:white;
}

.container{
    width:90%;
    max-width:520px;
    background:#1a1a2e;
    padding:25px;
    border-radius:25px;
    text-align:center;
    box-shadow:0 0 40px rgba(155,89,182,0.4);
}

.screen{display:none;}
.active{display:block;}

.btn{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:12px;
    background:linear-gradient(135deg,#9b59b6,#8e44ad);
    color:white;
    font-weight:bold;
    cursor:pointer;
}
.btn:hover{transform:translateY(-2px);}

.back{margin-top:10px;color:#aaa;cursor:pointer;}

/* TAROT */
.tarot-card{
    width:160px;
    height:260px;
    margin:20px auto;
    perspective:1000px;
}

.card-inner{
    width:100%;
    height:100%;
    transform-style:preserve-3d;
    transition:1s;
    position:relative;
}

.flip .card-inner{transform:rotateY(180deg);}

.card-front,.card-back{
    position:absolute;
    width:100%;
    height:100%;
    border-radius:15px;
    backface-visibility:hidden;
}

.card-front{
    background:url("https://images.unsplash.com/photo-1604079628346-35d1dce0f0d4?q=80&w=400") center/cover;
    box-shadow:0 0 25px #9b59b6;
}

.card-back{
    transform:rotateY(180deg);
    background:#111;
    border:2px solid #9b59b6;
    box-shadow:0 0 30px #9b59b6;
    display:flex;
    flex-direction:column;
    justify-content:flex-end;
    padding:10px;
}

.card-title{
    font-size:15px;
    font-weight:bold;
}

#meaning{
    margin-top:10px;
    font-size:14px;
    color:#ddd;
}

.glow{
    animation: glow 1.5s infinite alternate;
}
@keyframes glow{
    from{box-shadow:0 0 10px #9b59b6;}
    to{box-shadow:0 0 40px #9b59b6;}
}
</style>
</head>

<body>

<div class="container">

<!-- STEP 1 -->
<div id="step1" class="screen active">
<h2>Bạn hãy chọn team của mình nhé! 👋</h2>
<p id="countdown"></p>

<button class="btn" onclick="go('trade-choice')">Team Trade</button>
<button class="btn" onclick="go('asa-choice')">Team Asa</button>
</div>

<!-- TRADE -->
<div id="trade-choice" class="screen">
<h3>Team Trade</h3>
<button class="btn" onclick="go('trade-offline')">Offline</button>
<button class="btn" onclick="go('trade-online')">Online</button>
<span class="back" onclick="go('step1')">← back</span>
</div>

<div id="trade-offline" class="screen">
<button class="btn" onclick="wish('Chị Diệp','Chúc chị luôn xinh và chốt đơn cháy máy 🔥')">Chị Diệp</button>
<button class="btn" onclick="wish('Anh Tường','Chúc anh mãi đỉnh như phong độ hiện tại 😎')">Anh Tường</button>
<button class="btn" onclick="wish('Nhựt Ling','Chúc bà lúc nào cũng vui vẻ nha 😆')">Nhựt Ling</button>
<button class="btn" onclick="wish('Chị Phương','Chúc chị lúc nào cũng rực rỡ ✨')">Chị Phương</button>
<button class="btn" onclick="wish('Đức','Chúc ông code không bug 😏')">Đức</button>
<button class="btn" onclick="wish('Nam','Chúc ông làm đâu trúng đó 💸')">Nam</button>
<span class="back" onclick="go('trade-choice')">← back</span>
</div>

<div id="trade-online" class="screen">
<button class="btn" onclick="wish('Mơ','Chúc bà online nhưng vẫn đỉnh 😎')">Mơ</button>
<button class="btn" onclick="wish('Chị Trân','Chúc chị luôn nhiều năng lượng 🌟')">Chị Trân</button>
<button class="btn" onclick="wish('Chị Ánh','Chúc chị lúc nào cũng tỏa sáng ✨')">Chị Ánh</button>
<span class="back" onclick="go('trade-choice')">← back</span>
</div>

<!-- ASA -->
<div id="asa-choice" class="screen">
<h3>Team Asa</h3>
<button class="btn" onclick="go('asa-offline')">Offline</button>
<button class="btn" onclick="go('asa-online')">Online</button>
<span class="back" onclick="go('step1')">← back</span>
</div>

<div id="asa-offline" class="screen">
<button class="btn" onclick="wish('Chi','Chúc bà lúc nào cũng chill 😌')">Chi</button>
<button class="btn" onclick="wish('Chị Oanh','Chúc chị luôn nhiều năng lượng 💪')">Chị Oanh</button>
<button class="btn" onclick="wish('Hoài','Chúc bà luôn vui vẻ nha 😆')">Hoài</button>
<button class="btn" onclick="wish('Chị Quý','Chúc chị lúc nào cũng rực rỡ ✨')">Chị Quý</button>
<button class="btn" onclick="wish('Anh Quang','Chúc anh mãi phong độ 😎')">Anh Quang</button>
<button class="btn" onclick="wish('Thái','Chúc ông làm đâu thắng đó 💸')">Thái</button>
<span class="back" onclick="go('asa-choice')">← back</span>
</div>

<div id="asa-online" class="screen">
<button class="btn" onclick="wish('Chị Mai','Chúc chị luôn xinh đẹp ✨')">Chị Mai</button>
<button class="btn" onclick="wish('Chị Thảo','Chúc chị luôn vui vẻ 😄')">Chị Thảo</button>
<button class="btn" onclick="wish('Chị Huyền','Chúc chị lúc nào cũng năng lượng 🌟')">Chị Huyền</button>
<span class="back" onclick="go('asa-choice')">← back</span>
</div>

<!-- WISH -->
<div id="wish" class="screen">
<h3 id="name"></h3>
<p id="text"></p>

<button class="btn" onclick="drawTarot()">🔮 Lá bài tiên tri</button>

<div id="tarotArea" style="display:none;">
    <div id="card" class="tarot-card">
        <div class="card-inner">
            <div class="card-front glow"></div>
            <div class="card-back">
                <div id="cardName" class="card-title"></div>
            </div>
        </div>
    </div>
    <div id="meaning"></div>
</div>

<button class="btn" onclick="gift()">🎁 Lời chúc</button>

<span class="back" onclick="go('step1')">← back</span>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>
function go(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function wish(n,t){
    document.getElementById('name').innerText=n;
    document.getElementById('text').innerText=t;
    go('wish');
}

// countdown
const end=new Date("2026-04-28").getTime();
setInterval(()=>{
    let d=end-new Date().getTime();
    let day=Math.floor(d/86400000);
    document.getElementById('countdown').innerText="Còn "+day+" ngày là nghỉ 😏";
},1000);

// tarot
function drawTarot(){
    const data=[
    {
        n:"The Salary 💸",
        t:"Tiền sẽ đến... rồi đi nhanh hơn ánh sáng",
        img:"https://i.imgur.com/8Km9tLL.png",
        color:"#2ecc71"
    },
    {
        n:"The Deadline 💀",
        t:"Deadline tới nhưng bạn vẫn chill 😏",
        img:"https://i.imgur.com/jTq7GQK.png",
        color:"#e74c3c"
    },
    {
        n:"The Drama 🎭",
        t:"Drama có nhưng bạn chỉ đứng xem",
        img:"https://i.imgur.com/3ZQ3Z6F.png",
        color:"#9b59b6"
    },
    {
        n:"The Sleep 😴",
        t:"Ngủ đi rồi tính tiếp",
        img:"https://i.imgur.com/0y0y0y0.png",
        color:"#3498db"
    }
];

    const r=data[Math.floor(Math.random()*data.length)];

    let area=document.getElementById("tarotArea");
    let card=document.getElementById("card");
    let name=document.getElementById("cardName");
    let meaning=document.getElementById("meaning");

    area.style.display="block";
    card.classList.remove("flip");
    meaning.innerText="";

    setTimeout(()=>{
    name.innerText=r.n;

    // đổi ảnh theo từng lá
    document.querySelector('.card-front').style.background =
        `url(${r.img}) center/cover`;

    // đổi glow theo màu
    document.querySelector('.card-front').style.boxShadow =
        `0 0 25px ${r.color}`;

    document.querySelector('.card-back').style.boxShadow =
        `0 0 30px ${r.color}`;

    card.classList.add("flip");

    setTimeout(()=>{
        meaning.innerText=r.t;

        // confetti theo màu
        confetti({
            particleCount:120,
            spread:80,
            colors:[r.color]
        });

    },400);

},300);
}

// gift
function gift(){
    alert("🎉 Chúc bà nhiều tiền, ít drama!");
    confetti({particleCount:150,spread:100});
}
</script>

</body>
</html>
