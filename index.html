```html
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lời Chào Từ Bà T 🌸</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>

<style>
:root {
    --pink:#ffafcc;
    --deep:#fb6f92;
    --bg:#f8f9fa;
}

body{
    font-family:'Segoe UI';
    background:var(--bg);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:90%;max-width:520px;
    background:white;
    padding:25px;
    border-radius:25px;
    text-align:center;
    box-shadow:10px 10px 0 #ffc8dd;
}

.screen{display:none;}
.active{display:block;}

.btn{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:12px;
    background:var(--pink);
    color:white;
    font-weight:bold;
    cursor:pointer;
}

.btn:hover{background:var(--deep);}

.back{margin-top:10px;display:block;color:#777;cursor:pointer;}

/* TAROT */
.tarot-card{
    width:120px;height:180px;
    margin:15px auto;
    perspective:1000px;
}

.card-inner{
    width:100%;height:100%;
    transform-style:preserve-3d;
    transition:0.8s;
    position:relative;
}

.flip .card-inner{transform:rotateY(180deg);}

.card-front,.card-back{
    position:absolute;
    width:100%;height:100%;
    border-radius:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    backface-visibility:hidden;
}

.card-front{
    background:linear-gradient(135deg,#9b59b6,#8e44ad);
    color:white;
    font-size:28px;
}

.card-back{
    background:white;
    border:2px solid #9b59b6;
    transform:rotateY(180deg);
    padding:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- HOME -->
<div id="home" class="screen active">
<h2>Bà T nghỉ việc 😎</h2>
<p id="countdown"></p>

<button class="btn" onclick="go('trade')">Team Trade</button>
<button class="btn" onclick="go('asa')">Team Asa</button>
<button class="btn" onclick="go('quiz')">Mini game 🤡</button>
</div>

<!-- TRADE -->
<div id="trade" class="screen">
<h3>Trade</h3>
<button class="btn" onclick="wish('Chị Lan','Chúc chị chốt đơn mỏi tay')">Chị Lan</button>
<button class="btn" onclick="wish('Anh Tuấn','Chúc anh sớm có ny 😏')">Anh Tuấn</button>
<span class="back" onclick="go('home')">← back</span>
</div>

<!-- ASA -->
<div id="asa" class="screen">
<h3>Asa</h3>
<button class="btn" onclick="wish('Bạn Linh','Rất vui khi làm cùng bà')">Bạn Linh</button>
<span class="back" onclick="go('home')">← back</span>
</div>

<!-- QUIZ -->
<div id="quiz" class="screen">
<h3>Hôm nay bạn là ai 🤡</h3>
<button class="btn" onclick="randomResult()">Bấm để biết</button>
<p id="quizResult"></p>
<span class="back" onclick="go('home')">← back</span>
</div>

<!-- WISH -->
<div id="wish" class="screen">
<h3 id="name"></h3>
<p id="text"></p>

<button class="btn" onclick="drawTarot()">🔮 Rút bài Tarot</button>

<div id="tarotArea" style="display:none;">
    <div id="card" class="tarot-card">
        <div class="card-inner">
            <div class="card-front">🔮</div>
            <div class="card-back" id="cardName"></div>
        </div>
    </div>
    <p id="cardText"></p>
</div>

<button class="btn" onclick="gift()">🎁 Mở quà</button>

<span class="back" onclick="go('home')">← back</span>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<script>

// NAV
function go(id){
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

// WISH
function wish(n,t){
    document.getElementById('name').innerText=n;
    document.getElementById('text').innerText=t;
    go('wish');
}

// COUNTDOWN
const end=new Date("2026-04-28").getTime();
setInterval(()=>{
    let d=end-new Date().getTime();
    let day=Math.floor(d/86400000);
    document.getElementById('countdown').innerText="Còn "+day+" ngày là nghỉ 😏";
},1000);

// QUIZ RANDOM
function randomResult(){
    const list=[
        "Bạn là: người mở laptop xong không biết làm gì",
        "Bạn là: người chờ tan làm mỗi 5 phút",
        "Bạn là: người luôn nói 'để mai làm'",
        "Bạn là: người sống sót qua mọi deadline"
    ];
    document.getElementById('quizResult').innerText=list[Math.floor(Math.random()*list.length)];
}

// TAROT
function drawTarot(){
    const data=[
        {n:"The Deadline 💀",t:"Deadline tới nhưng bạn vẫn chill 😏"},
        {n:"The Salary 💸",t:"Tiền vào rồi ra nhanh hơn tốc độ ánh sáng"},
        {n:"The Drama 🎭",t:"Drama có nhưng không liên quan bạn"},
        {n:"The Sleep 😴",t:"Ngủ đi rồi tính tiếp"},
    ];

    const r=data[Math.floor(Math.random()*data.length)];

    let area=document.getElementById('tarotArea');
    let card=document.getElementById('card');
    let name=document.getElementById('cardName');
    let text=document.getElementById('cardText');

    area.style.display='block';
    card.classList.remove('flip');

    setTimeout(()=>{
        name.innerText=r.n;
        card.classList.add('flip');
        text.innerText=r.t;

        confetti({particleCount:100,spread:70});
    },200);
}

// GIFT
function gift(){
    alert("🎉 Chúc bà nhiều tiền, ít drama!");
    confetti({particleCount:150,spread:100});
}

</script>

</body>
</html>
```
